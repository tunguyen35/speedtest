<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Speed Test</h1>
            <p>Test your internet connection speed</p>
        </header>

        <main class="main">
            <!-- Controls -->
            <div class="controls">
                <button id="startBtn" class="btn btn-primary">▶ Start Test</button>
                <button id="resetBtn" class="btn btn-secondary" disabled>↺ Reset</button>
            </div>

            <!-- Status -->
            <div id="status" class="status" style="display: none;">
                <p id="statusText">Initializing...</p>
            </div>

            <!-- Results (hiện real-time) -->
            <div id="results" class="results" style="display: none;">
                <div class="result-card download-card">
                    <div class="result-icon">⬇️</div>
                    <div class="result-value">
                        <span id="downloadValue">-</span>
                        <span class="result-unit">Mbps</span>
                    </div>
                    <div class="result-label">Download</div>
                </div>

                <div class="result-card upload-card">
                    <div class="result-icon">⬆️</div>
                    <div class="result-value">
                        <span id="uploadValue">-</span>
                        <span class="result-unit">Mbps</span>
                    </div>
                    <div class="result-label">Upload</div>
                </div>

                <div class="result-card latency-card">
                    <div class="result-icon">📡</div>
                    <div class="result-value">
                        <span id="latencyValue">-</span>
                        <span class="result-unit">ms</span>
                    </div>
                    <div class="result-label">Latency</div>
                </div>

                <div class="result-card jitter-card">
                    <div class="result-icon">📊</div>
                    <div class="result-value">
                        <span id="jitterValue">-</span>
                        <span class="result-unit">ms</span>
                    </div>
                    <div class="result-label">Jitter</div>
                </div>
            </div>

            <!-- Progress -->
            <div id="progress" style="display: none; margin-top: 20px;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText" style="text-align:center; margin-top:8px; color:#667eea; font-weight:600;">0%</p>
            </div>
        </main>

        <!-- History -->
        <section class="history">
            <div class="history-header">
                <h2>📋 Test History</h2>
            </div>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
